<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 音频频谱可视化 (优化版)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510; /* 深色背景 */
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            box-shadow: 0 4px 15px rgba(0,255,100,0.2);
        }
        h3 { margin: 0 0 10px 0; font-size: 18px; color: #00ff44; text-shadow: 0 0 5px #00ff44; }
        input[type="file"] { color: white; margin-bottom: 12px; cursor: pointer;}
        .instructions { font-size: 13px; color: #ccc; margin-top: 8px; line-height: 1.5; }
        .instructions b { color: #00ffff; }
    </style>
</head>
<body>

    <div id="ui-container">
        <h3>🎵 导入音频生成 3D 频谱图</h3>
        <input type="file" id="audio-upload" accept="audio/*">
        <div class="instructions">
            1. 选择本地音乐文件<br>
            2. <b>鼠标左键拖拽</b>：旋转视角<br>
            3. <b>鼠标滚轮</b>：缩放距离<br>
            4. <b>鼠标右键拖拽</b>：平移视角
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // ==========================================
        // 1. 初始化 3D 场景、相机和渲染器
        // ==========================================
        const scene = new THREE.Scene();
        // 增加雾效浓度，让远处元素淡出，突出荧光
        scene.fog = new THREE.FogExp2(0x050510, 0.02); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 30); // 初始视角

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio); // 适配高分屏
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 初始化轨道控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 启用阻尼（惯性）
        controls.maxPolarAngle = Math.PI / 2 + 0.15; // 限制视角不能过度钻地

        // ==========================================
        // 2. 创建地面和荧光元素 (新增加和修改)
        // ==========================================
        
        // 创建地面网格 (模拟地形基底)
        const gridHelper = new THREE.GridHelper(150, 60, 0x111111, 0x111111);
        gridHelper.position.y = -0.1; // 稍微下移，避免和柱子穿模
        scene.add(gridHelper);

        // 🟢 荧光核心 (新增加)：在地面下方正中央放置一个点光源，模拟地面的绿色荧光色调
        const groundGlowLight = new THREE.PointLight(0x00ff44, 1.5, 60); // 颜色，强度，距离
        groundGlowLight.position.set(0, -2, 0); // 放在地面下方
        scene.add(groundGlowLight);

        const NUM_BARS = 64; // 频谱柱子的数量
        const bars = [];
        const reflectionBars = []; // 🟢 新增加的倒影阵列
        const barGroup = new THREE.Group();
        const reflectionGroup = new THREE.Group(); // 🟢 倒影组

        // 统一方块几何体参数
        const barWidth = 0.6;
        const spacingMultiplier = 1.8; // 🟢 【修改】增加横向间隔系数（之前是0.9）

        // 创建主频谱柱列
        for (let i = 0; i < NUM_BARS; i++) {
            // --- 主柱子 ---
            const geometry = new THREE.BoxGeometry(barWidth, 1, barWidth);
            geometry.translate(0, 0.5, 0); // 将几何体的缩放中心移到底部

            const material = new THREE.MeshBasicMaterial({ color: 0x00ff44 }); // 荧光绿
            const bar = new THREE.Mesh(geometry, material);
            
            // 柱子横向排开
            bar.position.x = (i - NUM_BARS / 2) * spacingMultiplier;
            bar.position.y = 0; // 紧贴地面

            barGroup.add(bar);
            bars.push(bar);

            // 🟢 --- 荧光倒影柱子 (新增加) ---
            const reflectionGeometry = new THREE.BoxGeometry(barWidth, 1, barWidth);
            reflectionGeometry.translate(0, -0.5, 0); // 将缩放中心移到顶部（反向缩放）

            const reflectionMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x00ff44, 
                transparent: true, // 🟢 开启透明
                opacity: 0.15, // 🟢 荧光强度：较低的半透明度模拟淡淡的反射
                depthWrite: false // 🟢 防止半透明元素排序引起的闪烁
            });
            const reflectionBar = new THREE.Mesh(reflectionGeometry, reflectionMaterial);
            
            // 和主柱子 X/Z 轴一致
            reflectionBar.position.x = bar.position.x;
            reflectionBar.position.y = -0.15; // 放在地面正下方

            reflectionGroup.add(reflectionBar);
            reflectionBars.push(reflectionBar);
        }
        scene.add(barGroup);
        scene.add(reflectionGroup); // 🟢 添加倒影组

        // ==========================================
        // 3. 创建其他背景元素 (保持不变)
        // ==========================================
        
        const floaters = [];
        for (let i = 0; i < 25; i++) {
            const geo = new THREE.PlaneGeometry(1, 2);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ccff, side: THREE.DoubleSide });
            const floater = new THREE.Mesh(geo, mat);
            
            floater.position.set(
                (Math.random() - 0.5) * 80, 
                10 + Math.random() * 25, 
                (Math.random() - 0.5) * 40
            );
            scene.add(floater);
            floaters.push({
                mesh: floater,
                speed: 0.01 + Math.random() * 0.03,
                baseY: floater.position.y
            });
        }

        // ==========================================
        // 4. 音频处理和动画逻辑 (增加了倒影的更新)
        // ==========================================
        let audioCtx, analyser, source;
        const dataArray = new Uint8Array(NUM_BARS * 2); // 数据缓存

        document.getElementById('audio-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 初始化 AudioContext 和 Analyser
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = NUM_BARS * 4;
            }

            const reader = new FileReader();
            reader.onload = function(ev) {
                audioCtx.decodeAudioData(ev.target.result, function(buffer) {
                    if (source) {
                        source.disconnect();
                    }
                    source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    source.start(0); // 播放
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // 核心渲染循环
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // 如果有音频数据，同时更新主柱子和地面倒影
            if (analyser && source) {
                analyser.getByteFrequencyData(dataArray);
                for (let i = 0; i < NUM_BARS; i++) {
                    const value = dataArray[i];
                    // 数据映射为高度
                    const targetHeight = Math.max(0.1, value / 7.5); 
                    
                    // 平滑过渡 (Lerp)
                    const lerpFactor = 0.25;
                    const newScaleY = bars[i].scale.y + (targetHeight - bars[i].scale.y) * lerpFactor;
                    
                    // 🟢 同时更新主柱子和地面倒影柱子的缩放
                    bars[i].scale.y = newScaleY;
                    reflectionBars[i].scale.y = newScaleY; // 倒影实时跟跳
                }
            }

            // 更新天空的悬浮方块，浮动并朝向相机
            floaters.forEach(f => {
                f.mesh.position.y = f.baseY + Math.sin(time * 0.8 + f.mesh.position.x * 0.1) * 2.5;
                f.mesh.lookAt(camera.position); 
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
